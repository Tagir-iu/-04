name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -H. -B_build

      - name: Build
        run: cmake --build _build

      - name: Install
        run: echo "installing..."

      - name: Run examples
        run: ./_build/example1
